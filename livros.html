<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Acervo - Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-[#F5F5DC] text-gray-800 font-sans min-h-screen relative">

    <header class="bg-[#5C4033] text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gestão de Acervo e Estoque</h1>
            <nav class="space-x-4">
                <span id="identificacaoUsuario" class="text-sm text-[#F5F5DC] opacity-80 mr-4"></span>
                <button onclick="location.href='painel.html'"
                    class="hover:text-[#F5F5DC] font-semibold transition-colors border-b-2 border-transparent hover:border-white">Voltar ao Painel</button>
                <button id="btnSair"
                    class="bg-[#8B5A2B] px-3 py-1 rounded hover:bg-red-700 transition-colors ml-4">Sair</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        <div class="bg-white p-6 rounded-lg shadow mb-8 border-t-4 border-[#8B5A2B]">
            <h2 class="text-xl font-bold text-[#5C4033] mb-4">Adicionar Nova Obra</h2>
            <form id="formNovoLivro" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-gray-700 text-sm font-bold mb-1">Título da Obra</label><input type="text" id="nomeLivro" required class="w-full border p-2 rounded focus:ring-2 focus:ring-[#8B5A2B]"></div>
                    <div><label class="block text-gray-700 text-sm font-bold mb-1">Autor</label><input type="text" id="autorLivro" class="w-full border p-2 rounded focus:ring-2 focus:ring-[#8B5A2B]"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div><label class="block text-gray-700 text-sm font-bold mb-1">ISBN / Código</label><input type="text" id="isbnLivro" class="w-full border p-2 rounded focus:ring-2 focus:ring-[#8B5A2B]"></div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Localização</label>
                        <select id="localLivro" class="w-full border p-2 rounded focus:ring-2 focus:ring-[#8B5A2B]">
                            <option value="Casa de Formação">Casa de Formação</option>
                            <option value="Cristo">Cristo</option>
                        </select>
                    </div>
                    <div><label class="block text-gray-700 text-sm font-bold mb-1">Quantidade</label><input type="number" id="qtdLivro" min="1" value="1" required class="w-full border p-2 rounded focus:ring-2 focus:ring-[#8B5A2B]"></div>
                </div>
                <div class="flex justify-end mt-4">
                    <button type="submit" class="px-6 py-2 bg-[#5C4033] text-white rounded hover:bg-[#3e2b22] shadow-sm font-semibold">Salvar no Acervo</button>
                </div>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-[#5C4033]">Inventário Completo</h2>
                <input type="text" id="buscaEstoque" placeholder="Filtrar por título..." class="w-full max-w-sm px-4 py-2 border rounded-full focus:ring-2 focus:ring-[#8B5A2B] bg-gray-50">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#F5F5DC] text-[#5C4033]">
                            <th class="p-3 border-b-2 border-[#8B5A2B]">Título</th>
                            <th class="p-3 border-b-2 border-[#8B5A2B]">Autor</th>
                            <th class="p-3 border-b-2 border-[#8B5A2B]">Localização</th>
                            <th class="p-3 border-b-2 border-[#8B5A2B] text-center">Unidades</th>
                            <th class="p-3 border-b-2 border-[#8B5A2B] text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaGestaoLivros" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalEdicao" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-lg border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-blue-700 mb-4">Editar Obra</h2>
            <form id="formEdicaoLivro" class="space-y-4">
                <input type="hidden" id="editIdLivro">
                <div><label class="block text-gray-700 text-sm font-bold">Título</label><input type="text" id="editNome" required class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-gray-700 text-sm font-bold">Autor</label><input type="text" id="editAutor" class="w-full border p-2 rounded"></div>
                    <div><label class="block text-gray-700 text-sm font-bold">ISBN</label><input type="text" id="editIsbn" class="w-full border p-2 rounded"></div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="document.getElementById('modalEdicao').classList.add('hidden')" class="px-4 py-2 bg-gray-300 text-gray-800 rounded">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Atualizar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const banco = supabase.createClient('https://wuzezgodtgumiznjcvaf.supabase.co', 'sb_publishable_f3BbG-BIzTdUJHrV9dQEyA_gBY-wQBH');
        const sessao = JSON.parse(localStorage.getItem('sessaoBiblioteca'));

        if (!sessao || sessao.status !== 'adm') location.href = 'painel.html';
        document.getElementById('identificacaoUsuario').innerText = `Admin: ${sessao.email}`;

        async function carregarInventario() {
            const { data: livros, error } = await banco.from('livros').select('*').order('nome');
            const tbody = document.getElementById('tabelaGestaoLivros');
            tbody.innerHTML = '';

            if (livros) {
                livros.forEach(l => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3">${l.nome}</td>
                            <td class="p-3">${l.autor || '-'}</td>
                            <td class="p-3">${l.localizacao}</td>
                            <td class="p-3 text-center">${l.n_exemplares || 1}</td>
                            <td class="p-3 text-center"><button onclick="abrirEdicao(${l.id_livro}, '${l.nome}', '${l.autor}', '${l.isbn}', '${l.localizacao}', ${l.n_exemplares})" class="text-blue-600">✏️</button></td>
                        </tr>`;
                });
            }
        }

        document.getElementById('formNovoLivro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await banco.from('livros').insert([{
                nome: document.getElementById('nomeLivro').value,
                autor: document.getElementById('autorLivro').value,
                isbn: document.getElementById('isbnLivro').value,
                localizacao: document.getElementById('localLivro').value,
                n_exemplares: parseInt(document.getElementById('qtdLivro').value)
            }]);
            if (!error) { e.target.reset(); carregarInventario(); }
        });

        document.getElementById('btnSair').addEventListener('click', () => {
            localStorage.removeItem('sessaoBiblioteca');
            location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', carregarInventario);
    </script>
</body>
</html>
