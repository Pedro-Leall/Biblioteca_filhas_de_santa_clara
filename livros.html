<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Livros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-fundo { background-image: url('img/santaclara.png'); background-size: cover; background-attachment: fixed; }
    </style>
</head>
<body class="bg-fundo min-h-screen p-6">
    <div class="max-w-6xl mx-auto bg-[#F5F5DC]/65 backdrop-blur-md rounded-lg shadow-xl p-8 border border-white/40">
        <h1 class="text-3xl font-bold text-[#5C4033] mb-6">Gestão de Livros</h1>
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-[#5C4033]/20">
                    <th class="p-3">ID</th>
                    <th class="p-3">Nome do Livro</th>
                </tr>
            </thead>
            <tbody id="lista-livros">
                <tr><td colspan="2" class="p-4 text-center">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        const banco = supabase.createClient('SUA_URL_SUPABASE', 'SUA_KEY_SUPABASE');
        async function carregarLivros() {
            const { data } = await banco.from('livros').select('*');
            const tbody = document.getElementById('lista-livros');
            tbody.innerHTML = '';
            if (data) {
                data.forEach(l => {
                    tbody.innerHTML += `<tr class="border-b border-[#5C4033]/10">
                        <td class="p-3">${l.id_livro}</td>
                        <td class="p-3">${l.nome}</td>
                    </tr>`;
                });
            }
        }
        document.addEventListener('DOMContentLoaded', carregarLivros);
    </script>
</body>
</html>
