<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Livros - Biblioteca Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
        .bg-fundo-personalizado {
            background-image: url('img/santaclara.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-fundo-personalizado min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-[#F5F5DC]/65 backdrop-blur-md rounded-lg shadow-xl p-8 border border-white/40">
        <h1 class="text-3xl font-bold text-[#5C4033] mb-6">Gestão de Livros</h1>
        
        <div id="container-tabela" class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-[#5C4033]/20">
                        <th class="p-3 text-[#5C4033]">ID</th>
                        <th class="p-3 text-[#5C4033]">Nome do Livro</th>
                    </tr>
                </thead>
                <tbody id="lista-livros">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const urlProjeto = 'https://wuzezgodtgumiznjcvaf.supabase.co';
        const chavePublica = 'sb_publishable_f3BbG-BIzTdUJHrV9dQEyA_gBY-wQBH';
        const banco = supabase.createClient(urlProjeto, chavePublica);

        // Verificação de Sessão
        if (!localStorage.getItem('sessaoBiblioteca')) {
            location.href = 'index.html';
        }

        async function carregarLivros() {
            const { data, error } = await banco.from('livros').select('*');
            
            if (error) {
                console.error("Erro:", error);
                return;
            }

            // Desenha a tabela na tela
            const lista = document.getElementById('lista-livros');
            lista.innerHTML = ''; // Limpa antes de carregar

            data.forEach(livro => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-[#5C4033]/10";
                tr.innerHTML = `
                    <td class="p-3">${livro.id_livro}</td>
                    <td class="p-3 font-medium">${livro.nome}</td>
                `;
                lista.appendChild(tr);
            });
        }

        carregarLivros();
    </script>
</body>
</html>
