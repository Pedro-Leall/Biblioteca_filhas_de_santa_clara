<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Livros - Biblioteca Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
        .bg-fundo-personalizado {
            background-image: url('img/santaclara.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-fundo-personalizado min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-[#F5F5DC]/65 backdrop-blur-md rounded-lg shadow-xl p-8 border border-white/40">
        <h1 class="text-3xl font-bold text-[#5C4033] mb-6">Gestão de Livros</h1>
        </div>

<script>
        const urlProjeto = 'https://wuzezgodtgumiznjcvaf.supabase.co';
        const chavePublica = 'sb_publishable_f3BbG-BIzTdUJHrV9dQEyA_gBY-wQBH';
        const banco = supabase.createClient(urlProjeto, chavePublica);

        // 1. Validação de segurança
        const sessao = localStorage.getItem('sessaoBiblioteca');
        if (!sessao) {
            console.log("Sem sessão, voltando ao início.");
            location.href = 'index.html';
        }

        // 2. Função de carregamento com tratamento de erro
        async function carregarLivros() {
            try {
                console.log("Buscando livros...");
                const { data, error } = await banco.from('livros').select('*');
                
                if (error) throw error;
                
                console.log("Livros encontrados:", data);
                // Aqui você adicionaria o código que cria a tabela na tela
                
            } catch (err) {
                console.error("Erro ao buscar livros no banco:", err.message);
                alert("Erro ao carregar dados: " + err.message);
            }
        }

        // Executar após o carregamento da página
        carregarLivros();
    </script>
</body>
</html>
