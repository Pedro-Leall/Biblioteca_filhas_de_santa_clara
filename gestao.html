<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentações - Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F5F5DC] text-gray-800 font-sans min-h-screen relative">

    <header class="bg-[#5C4033] text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gestão de Empréstimos</h1>
            <nav class="space-x-4">
                <span id="identificacaoUsuario" class="text-sm text-[#F5F5DC] opacity-80 mr-4"></span>
                <button onclick="location.href='painel.html'"
                    class="hover:text-[#F5F5DC] font-semibold transition-colors border-b-2 border-transparent hover:border-white">Voltar
                    ao Painel</button>
                <button id="btnSair"
                    class="bg-[#8B5A2B] px-3 py-1 rounded hover:bg-red-700 transition-colors ml-4">Sair</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-600">
                <h2 class="text-xl font-bold text-blue-700 mb-4">Registrar Saída</h2>
                <form id="formNovaSaida" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Usuário</label>
                        <select id="selectUsuario" required
                            class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-600"></select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Livro</label>
                        <select id="selectLivro" required
                            class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-600"></select>
                    </div>
                    <p id="msgErroSaida" class="text-red-500 text-xs hidden font-semibold">Operação bloqueada:
                        duplicidade ou falta de estoque.</p>
                    <button type="submit"
                        class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-semibold transition-colors">Confirmar
                        Saída</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-[#5C4033]">Empréstimos em Andamento</h2>
                    <input type="text" id="buscaEmprestimo" placeholder="Buscar usuário ou livro..."
                        class="w-full max-w-xs px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-[#8B5A2B] bg-gray-50 text-sm">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[#F5F5DC] text-[#5C4033]">
                                <th class="p-3 border-b-2 border-[#8B5A2B]">Obra</th>
                                <th class="p-3 border-b-2 border-[#8B5A2B]">Usuário</th>
                                <th class="p-3 border-b-2 border-[#8B5A2B] text-center">Situação / Vencimento</th>
                                <th class="p-3 border-b-2 border-[#8B5A2B] text-center w-32">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaGestaoEmprestimos" class="text-gray-700 text-sm">
                            <tr>
                                <td colspan="4" class="p-4 text-center text-gray-500">Buscando dados no servidor...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const banco = supabase.createClient('https://wuzezgodtgumiznjcvaf.supabase.co', 'sb_publishable_f3BbG-BIzTdUJHrV9dQEyA_gBY-wQBH');

        const sessao = JSON.parse(localStorage.getItem('sessaoBiblioteca'));
        if (!sessao || sessao.status !== 'adm') location.href = 'painel.html';

        document.getElementById('identificacaoUsuario').innerText = `Admin: ${sessao.email}`;

        document.getElementById('buscaEmprestimo').addEventListener('input', function (e) {
            const termo = e.target.value.toLowerCase();
            document.querySelectorAll('#tabelaGestaoEmprestimos tr').forEach(linha => {
                const texto = linha.innerText.toLowerCase();
                linha.style.display = texto.includes(termo) ? '' : 'none';
            });
        });

        async function carregarListasDeSelecao() {
            const { data: usuarios } = await banco.from('usuarios').select('id_usuario, email').order('email');
            const selUsu = document.getElementById('selectUsuario');
            selUsu.innerHTML = '<option value="">Selecione...</option>';
            if (usuarios) usuarios.forEach(u => selUsu.innerHTML += `<option value="${u.id_usuario}">${u.email}</option>`);

            const { data: livros } = await banco.from('livros').select('id_livro, nome').order('nome');
            const selLiv = document.getElementById('selectLivro');
            selLiv.innerHTML = '<option value="">Selecione...</option>';
            if (livros) livros.forEach(l => selLiv.innerHTML += `<option value="${l.id_livro}">${l.nome}</option>`);
        }

        async function carregarTabelaEmprestimos() {
            // Adicionado "error" para capturar bloqueios do banco de dados
            const { data: emprestimos, error } = await banco
                .from('emprestimos')
                .select('id_emprestimo, data_prevista_devolucao, status, livros(nome), usuarios(email)')
                .in('status', ['Ativo', 'Renovado', 'Devolucao Pendente'])
                .order('data_prevista_devolucao', { ascending: true });

            const tbody = document.getElementById('tabelaGestaoEmprestimos');
            tbody.innerHTML = '';

            // Tratamento de falha visual
            if (error) {
                console.error("Falha ao buscar empréstimos:", error);
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-600 font-bold bg-red-50">Erro de conexão: ${error.message}</td></tr>`;
                return;
            }

            const hoje = new Date().toISOString().split('T')[0];

            if (emprestimos && emprestimos.length > 0) {
                emprestimos.forEach(emp => {
                    const isPendente = emp.status === 'Devolucao Pendente';
                    const emAtraso = emp.data_prevista_devolucao < hoje && !isPendente;

                    const corLinha = isPendente ? 'bg-yellow-50 border-l-4 border-yellow-500' : (emAtraso ? 'bg-red-50 border-l-4 border-red-500' : 'hover:bg-gray-50 border-l-4 border-transparent');
                    const corData = emAtraso ? 'text-red-600 font-bold' : '';
                    const dataBR = emp.data_prevista_devolucao.split('-').reverse().join('/');

                    const txtStatus = isPendente ? '<span class="text-xs font-bold text-yellow-700 bg-yellow-200 px-2 py-1 rounded inline-block mb-1">Conferir</span><br>' : '';

                    const btnAcao = isPendente
                        ? `<button onclick="baixarDevolucao(${emp.id_emprestimo})" class="bg-yellow-600 text-white px-3 py-2 rounded text-xs hover:bg-yellow-700 w-full shadow-sm font-bold uppercase tracking-wider">Confirmar</button>`
                        : `<button onclick="baixarDevolucao(${emp.id_emprestimo})" class="bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700 w-full shadow-sm font-semibold">Baixar</button>`;

                    tbody.innerHTML += `
                        <tr class="border-b transition-colors ${corLinha}">
                            <td class="p-3 font-medium text-[#5C4033] pl-4">${emp.livros.nome}</td>
                            <td class="p-3">${emp.usuarios.email}</td>
                            <td class="p-3 text-center ${corData}">${txtStatus}${dataBR}</td>
                            <td class="p-3 text-center">${btnAcao}</td>
                        </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">Nenhum empréstimo em andamento.</td></tr>';
            }
        }

        window.baixarDevolucao = async function (id) {
            const { error } = await banco.from('emprestimos').update({ status: 'Devolvido' }).eq('id_emprestimo', id);
            if (!error) carregarTabelaEmprestimos();
        }

        document.getElementById('formNovaSaida').addEventListener('submit', async (e) => {
            e.preventDefault();
            const aviso = document.getElementById('msgErroSaida');
            aviso.classList.add('hidden');

            const idU = document.getElementById('selectUsuario').value;
            const idL = document.getElementById('selectLivro').value;

            const { data: ja } = await banco.from('emprestimos').select('id_emprestimo').eq('id_livro', idL).eq('id_usuario', idU).in('status', ['Ativo', 'Renovado', 'Devolucao Pendente']);
            if (ja && ja.length > 0) { aviso.classList.remove('hidden'); return; }

            const { data: l } = await banco.from('livros').select('n_exemplares').eq('id_livro', idL).single();
            const { count: tot } = await banco.from('emprestimos').select('*', { count: 'exact', head: true }).eq('id_livro', idL).in('status', ['Ativo', 'Renovado', 'Devolucao Pendente']);
            if (tot >= (l.n_exemplares || 1)) { aviso.classList.remove('hidden'); return; }

            const d = new Date(); d.setDate(d.getDate() + 15);
            const { error } = await banco.from('emprestimos').insert([{ id_usuario: idU, id_livro: idL, data_prevista_devolucao: d.toISOString().split('T')[0] }]);

            if (!error) {
                e.target.reset();
                carregarTabelaEmprestimos();
            }
        });

        document.getElementById('btnSair').addEventListener('click', () => {
            localStorage.removeItem('sessaoBiblioteca');
            location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            carregarListasDeSelecao();
            carregarTabelaEmprestimos();
        });
    </script>
</body>

</html>
