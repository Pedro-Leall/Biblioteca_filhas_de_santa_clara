<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso - Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-fundo { background-image: url('img/santaclara.png'); background-size: cover; background-position: center; background-attachment: fixed; }
    </style>
</head>
<body class="bg-fundo min-h-screen flex items-center justify-center p-4">
    <div class="bg-[#F5F5DC]/65 backdrop-blur-md rounded-lg shadow-xl w-full max-w-md p-10 border border-white/40">
        <h2 class="text-3xl font-bold text-[#5C4033] text-center mb-8">Login</h2>
        <form id="formAcesso" class="space-y-5">
            <input type="email" id="email" placeholder="E-mail" required class="w-full px-4 py-3 rounded-lg border">
            <input type="password" id="senha" placeholder="Senha" required class="w-full px-4 py-3 rounded-lg border">
            <button type="submit" class="w-full py-3 bg-[#5C4033] text-white rounded-lg font-bold">Entrar</button>
        </form>
    </div>
    <script>
        const banco = supabase.createClient('URL', 'KEY');
        document.getElementById('formAcesso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data } = await banco.from('usuarios').select('*').eq('email', document.getElementById('email').value).eq('senha', document.getElementById('senha').value);
            if (data?.length) { localStorage.setItem('sessaoBiblioteca', JSON.stringify(data[0])); location.href = 'painel.html'; }
        });
    </script>
</body>
</html>
