<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Biblioteca Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #2A0303; color: #2A0303; }
        .bg-moderno { background-color: #B29595; }
        .text-moderno { color: #2A0303; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-[#2A0303] text-[#B29595] p-4 border-b border-[#B29595]/30">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Biblioteca Santa Clara</h1>
            <nav class="space-x-4">
                <span id="identificacaoUsuario" class="text-sm opacity-80"></span>
                <button id="btnSair" class="bg-[#8B5A2B] px-3 py-1 rounded hover:bg-red-700 transition-colors">Sair</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-8">
        
        <div class="bg-moderno p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold text-[#2A0303] mb-4">Monitoramento de Prazos</h2>
            <div id="areaNotificacoes" class="text-sm text-[#2A0303]/80"></div>
        </div>

        <div class="bg-moderno p-6 rounded-xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-[#2A0303]">Catálogo de Livros</h2>
                <input type="text" id="buscaLivro" placeholder="Pesquisar..." class="px-4 py-2 rounded-full bg-[#2A0303]/10 border border-[#2A0303]/20">
            </div>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[#2A0303]/70 border-b border-[#2A0303]/20">
                        <th class="p-3">Título</th>
                        <th class="p-3">Autor</th>
                        <th class="p-3">Localização</th>
                    </tr>
                </thead>
                <tbody id="listaLivros" class="text-[#2A0303]"></tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const banco = supabase.createClient('https://wuzezgodtgumiznjcvaf.supabase.co', 'sb_publishable_f3BbG-BIzTdUJHrV9dQEyA_gBY-wQBH');
        const sessao = JSON.parse(localStorage.getItem('sessaoBiblioteca'));
        
        if (!sessao) location.href = 'index.html';
        document.getElementById('identificacaoUsuario').innerText = `Admin: ${sessao.email}`;

        async function atualizarTudo() {
            // Carregar Livros
            const { data: livros } = await banco.from('livros').select('*');
            const tbody = document.getElementById('listaLivros');
            tbody.innerHTML = livros ? livros.map(l => `
                <tr class="border-b border-[#2A0303]/10">
                    <td class="p-3">${l.nome}</td>
                    <td class="p-3">${l.autor || '-'}</td>
                    <td class="p-3">${l.localizacao}</td>
                </tr>`).join('') : '';

            // Carregar Notificações
            const { data: emprestimos } = await banco.from('emprestimos').select('data_prevista_devolucao, livros(nome)').eq('status', 'Ativo');
            const area = document.getElementById('areaNotificacoes');
            area.innerHTML = emprestimos?.map(e => `<p class="mb-2"><b>${e.livros.nome}</b>: Vence em ${e.data_prevista_devolucao}</p>`).join('') || 'Nenhuma pendência.';
        }

        document.getElementById('btnSair').onclick = () => { localStorage.removeItem('sessaoBiblioteca'); location.href = 'index.html'; };
        document.addEventListener('DOMContentLoaded', atualizarTudo);
    </script>
</body>
</html>
