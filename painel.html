<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Santa Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F5DC] min-h-screen">
    <header class="bg-[#5C4033] text-white p-4">
        <nav class="max-w-6xl mx-auto flex justify-between">
            <h1 class="font-bold">Biblioteca Santa Clara</h1>
            <div class="space-x-4">
                <a href="livros.html">Gestão de Livros</a>
                <button id="btnSair" class="text-red-300">Sair</button>
            </div>
        </nav>
    </header>
    <main class="max-w-6xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-[#5C4033]">Bem-vindo!</h2>
    </main>
    <script>
        const sessao = JSON.parse(localStorage.getItem('sessaoBiblioteca'));
        if (!sessao) location.href = 'index.html';
        document.getElementById('btnSair').onclick = () => { localStorage.removeItem('sessaoBiblioteca'); location.href = 'index.html'; };
    </script>
</body>
</html>
